services:
  listserver:
    # Pre-built image published by .github/workflows/build-publish.yml.
    # Portainer deploys this file as-is (no build support). For local dev,
    # compose.override.yaml adds `build: .` automatically.
    # Pin a version for production, e.g. LISTSERVER_TAG=1.2.3 docker compose up -d
    image: ${LISTSERVER_IMAGE:-ghcr.io/luben93/listserver}:${LISTSERVER_TAG:-latest}
    container_name: listserver
    restart: unless-stopped
    ports:
      # LAN-only service — firewall port 3000 and don't forward it to the internet.
      - "${LISTSERVER_BIND:-3000}:3000"
    volumes:
      - list-data:/data
      - ./pages:/app/pages   # mount pages dir so you can add files without rebuilding
    environment:
      - PORT=3000
      - DATA_DIR=/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  list-data:
    # Fixed name: the volume is NOT prefixed with the compose project name,
    # so data survives renaming the app/service/folder or redeploying elsewhere.
    name: listserver-data
